name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run the workflow without actually publishing to PyPI"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies & build package
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          trusted-publishing: never
          dry-run: ${{ inputs.dry-run || false }}

      - name: Create GitHub Release
        if: !(inputs.dry-run || false)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: dist/*
          name: PyMCPX v${{ env.VERSION }}
          body: |
            # PyMCPX v${{ env.VERSION }}

            MCP-compatible LangChain tools for AI agents — calculator, datetime, converter, and more.

            ## Services Included:
            - **Calculator** (`pymcpx[calculator]`)
            - **Converter** (`pymcpx[converter]`)
            - **Datetime** (`pymcpx[datetime]`)
            - **IPstack** (`pymcpx[ipstack]`)
            - **Marketstack** (`pymcpx[marketstack]`)
            - **Weatherstack** (`pymcpx[weatherstack]`)
            - **Numverify** (`pymcpx[numverify]`)
            - **Fixer** (`pymcpx[fixer]`)
            - **Aviationstack** (`pymcpx[aviationstack]`)
            - **Zenserp** (`pymcpx[zenserp]`)
            - **Screenshotlayer** (`pymcpx[screenshotlayer]`)
            - **ExchangeRate.host** (`pymcpx[exchangeratehost]`)

            ## Installation

            Install the core package:
            ```bash
            pip install pymcpx
            ```

            Or install with all services:
            ```bash
            pip install "pymcpx[all]"
            ```
          draft: false
          prerelease: false
